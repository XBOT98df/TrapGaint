name: Deploy Lapetus Mod

on:
  push:
    paths:
      - 'lunar-agent/**'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
      
      - name: Build mod
        working-directory: lunar-agent
        run: |
          chmod +x gradlew
          # Retry build up to 3 times in case of transient Maven issues
          for i in 1 2 3; do
            ./gradlew clean build --no-daemon --stacktrace && break || {
              echo "Build attempt $i failed, retrying in 30 seconds..."
              sleep 30
            }
          done
      
      - name: Get version info
        id: version
        run: |
          echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Create mod-dist directory
        run: |
          mkdir -p mod-dist
          cp lunar-agent/build/libs/lapetus-client-1.0.0.jar mod-dist/lapetus-client-latest.jar
          echo "${{ steps.version.outputs.date }}-${{ steps.version.outputs.sha_short }}" > mod-dist/version.txt
      
      - name: Deploy to mod-dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mod-dist
          publish_branch: mod-dist
          force_orphan: true
          commit_message: "Deploy mod ${{ steps.version.outputs.date }}"
      
      - name: Create/Update latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mod-latest
          name: "Lapetus Mod (Latest)"
          body: |
            Automatically built from commit ${{ github.sha }}
            Build time: ${{ steps.version.outputs.date }}
          files: |
            lunar-agent/build/libs/lapetus-client-1.0.0.jar
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
