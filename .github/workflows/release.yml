name: Release

on:
  push:
    branches:
      - Dragon
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.47)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            # Get version from package.json for branch pushes
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
      
      - name: Create latest.json
        run: |
          cat > latest.json << EOF
          {
            "version": "${{ steps.get-version.outputs.version }}",
            "notes": "Dragon Client v${{ steps.get-version.outputs.version }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat latest.json
      
      - name: Delete existing release if exists
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v${{ steps.get-version.outputs.version }} -y || true
          git push origin :refs/tags/v${{ steps.get-version.outputs.version }} || true
      
      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const latestJson = fs.readFileSync('latest.json', 'utf8');
            
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `Dragon Client v${{ steps.get-version.outputs.version }}`,
              body: `## Dragon Client v${{ steps.get-version.outputs.version }}\n\n### Downloads\n\n**Windows:** Download the \`.msi\` installer from this release.\n\n> ⚠️ If SmartScreen appears, use **More info → Run anyway**.\n> Reputation improves over time and with code-signing certificates.\n\n**macOS:** Download the \`.pkg\` installer and run it. If macOS blocks the app, run:\n\`\`\`bash\nxattr -cr /Applications/Dragon\\ Client.app\n\`\`\`\n\n### Verify Integrity\n\nA \`SHA256SUMS.txt\` file is uploaded with every release.\nCompare your downloaded file hash before running it.\n\n### Auto-Update\n\nThe app will automatically check for updates and notify you when a new version is available.\n\n### Latest Version Info\n\n\`\`\`json\n${latestJson}\n\`\`\``,
              draft: false,
              prerelease: false
            })
            return data.id
      
      - name: Upload latest.json to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const latestJson = fs.readFileSync('latest.json');
            
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.create-release.outputs.result }},
              name: 'latest.json',
              data: latestJson
            })

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel
          # Windows build
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          # Ensure Xcode command line tools are available
          xcode-select --install 2>/dev/null || true
          # Install dependencies for Tauri
          rustup target add ${{ matrix.target }}

      - name: Install npm dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}
          includeUpdaterJson: false
      
      - name: Remove quarantine from macOS app
        if: matrix.platform == 'macos-latest'
        run: |
          echo "Removing quarantine attributes from macOS app..."
          find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -exec xattr -cr {} \; || true
          echo "Quarantine attributes removed"
        continue-on-error: true
      
      - name: Create macOS .pkg installer
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found, skipping .pkg creation"
            exit 0
          fi
          APP_NAME=$(basename "$APP_PATH" .app)
          ARCH="${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x64' }}"
          PKG_NAME="${APP_NAME}_${ARCH}.pkg"
          
          echo "Creating .pkg from: $APP_PATH"
          echo "Output: $PKG_NAME"
          
          # Create .pkg installer using productbuild
          xcrun productbuild \
            --component "$APP_PATH" /Applications \
            "$PKG_NAME"
          
          echo "Created $PKG_NAME ($(du -h "$PKG_NAME" | cut -f1))"
          
          # Upload .pkg to release
          VERSION="${{ needs.create-release.outputs.version }}"
          gh release upload "v${VERSION}" "$PKG_NAME" --clobber
          echo "Uploaded $PKG_NAME to release v${VERSION}"
      
  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create updater JSON files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          
          # Download signature files from release
          gh release download "v${VERSION}" --pattern "*.sig" || echo "No signature files yet"
          
          # Create platform-specific updater JSONs and aggregate them into latest.json
          PLATFORMS_JSON=""
          
          for platform in darwin-x86_64 darwin-aarch64 windows-x86_64; do
            case $platform in
              darwin-x86_64) file="TrapGaint_x64.app.tar.gz" ;;
              darwin-aarch64) file="TrapGaint_aarch64.app.tar.gz" ;;
              windows-x86_64)
                file="$(ls -1 TrapGaint_*_x64_en-US.msi.sig TrapGaint_*_x64-setup.exe.sig 2>/dev/null | head -n 1 | sed 's/\.sig$//' || true)"
                ;;
            esac

            if [ -z "$file" ]; then
              echo "No updater asset found for ${platform}; skipping"
              continue
            fi
            
            sig_file="${file}.sig"
            
            if [ -f "$sig_file" ]; then
              signature=$(cat "$sig_file")
              # Add comma if not the first entry
              if [ -n "$PLATFORMS_JSON" ]; then
                PLATFORMS_JSON="${PLATFORMS_JSON},"
              fi
              PLATFORMS_JSON="${PLATFORMS_JSON}\"${platform}\": {\"signature\": \"${signature}\", \"url\": \"${RELEASE_URL}/${file}\"}"
              
              # Still generate individual files just in case
              printf '{\n  "version": "%s",\n  "notes": "TrapGaint v%s",\n  "pub_date": "%s",\n  "platforms": {\n    "%s": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' \
                "${VERSION}" "${VERSION}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${platform}" "${signature}" "${RELEASE_URL}/${file}" > "${platform}.json"
            fi
          done
          
          # Generate the final comprehensive latest.json
          printf '{\n  "version": "%s",\n  "notes": "TrapGaint v%s",\n  "pub_date": "%s",\n  "platforms": {%s}\n}\n' \
            "${VERSION}" "${VERSION}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${PLATFORMS_JSON}" > latest.json
          
          # Upload updater JSONs to release
          for json in *.json latest.json; do
            if [ -f "$json" ]; then
              gh release upload "v${VERSION}" "$json" --repo ${{ github.repository }} --clobber
              echo "Uploaded $json"
            fi
          done
      
      - name: Verify latest.json in release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking release assets..."
          gh release view v${{ needs.create-release.outputs.version }} --json assets

      - name: Generate and upload SHA256 checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          WORKDIR="$(mktemp -d)"
          trap 'rm -rf "$WORKDIR"' EXIT

          echo "Downloading release assets for checksum generation..."
          gh release download "v${VERSION}" --dir "$WORKDIR" --clobber

          cd "$WORKDIR"
          # Keep checksums focused on downloadable binaries/archives.
          rm -f *.sig *.json SHA256SUMS.txt || true

          if ls -1 >/dev/null 2>&1; then
            sha256sum * | sort > SHA256SUMS.txt
            cat SHA256SUMS.txt
            gh release upload "v${VERSION}" "SHA256SUMS.txt" --repo ${{ github.repository }} --clobber
            echo "Uploaded SHA256SUMS.txt"
          else
            echo "No release files found for checksum generation after filtering."
          fi
          
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Release v${{ needs.create-release.outputs.version }} published successfully!')
            console.log('Auto-update will now detect this version.')
