<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting TrapGaint</title>
  <link rel="preload" href="/startup.html/spalsh.jpg" as="image" fetchpriority="high">
  <link rel="preload" href="/NewIcons.svg" as="image" fetchpriority="high">
  <link rel="preload" href="/trapcode.png" as="image" fetchpriority="high">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: block;
    }

    body.night {
      background: #fff;
    }

    .split {
      width: 100%;
      height: 100%;
      display: flex;
      background: #000;
    }

    body.night .split {
      background: #fff;
    }

    .left {
      flex: 1.1;
      min-width: 0;
      overflow: hidden;
      position: relative;
      background: #000 url('/spalsh-optimized.jpg') center / cover no-repeat;
      transform: translateZ(0);
    }

    .left::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.22) 0%, rgba(0, 0, 0, 0.58) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .right {
      flex: 0.9;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }

    body.night .right {
      background: #fff;
    }

    .right::before {
      content: "";
      position: absolute;
      left: 0;
      top: 12%;
      bottom: 12%;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.25), transparent);
    }

    body.night .right::before {
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.25), transparent);
    }

    .logo {
      width: clamp(178px, 29vw, 270px);
      height: clamp(178px, 29vw, 270px);
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(255, 255, 255, 0.14));
      user-select: none;
      -webkit-user-drag: none;
      transform: scale(1);
      transform-origin: center;
      will-change: transform;
    }

    body.night .logo {
      transform: scale(1.3);
    }

    /* TrapGaint branding - top left */
    .branding {
      position: absolute;
      top: 32px;
      left: 32px;
      z-index: 10;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
      opacity: 0;
      animation: fadeInSlide 0.6s ease-out 0.2s forwards;
    }

    /* Loading status - left side below branding */
    .loading-container {
      position: absolute;
      top: 90px;
      left: 32px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeInSlide 0.6s ease-out 0.4s forwards;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .status-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: #fff;
      animation: fadeText 0.3s ease-in-out;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeText {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <!-- TrapGaint branding -->
  <div class="branding">TRAPGAINT</div>

  <div class="split">
    <div class="left" aria-label="Splash image"></div>
    <div class="right">
      <img id="startupLogo" src="/NewIcons.svg" class="logo" alt="TrapGaint" loading="eager" decoding="sync" fetchpriority="high">
    </div>
  </div>

  <!-- Loading status -->
  <div class="loading-container">
    <div class="spinner"></div>
    <div class="status-text" id="statusText">Fetching profile</div>
  </div>

  <script>
    (function () {
      const hour = new Date().getHours();
      const isNight = hour >= 19 || hour < 6;
      const logo = document.getElementById('startupLogo');
      const leftPanel = document.querySelector('.left');
      if (!logo) return;

      const startupBackgroundImages = [
        '/startup.html/0942b1f81f22591ff8e3157d93e4495e.jpg',
        '/startup.html/1df85d851105b07355720c29ae81e5c9.jpg',
        '/startup.html/4296a454ca63fbe6ebfb4135d66a472f.jpg',
        '/startup.html/49bb17dcc7a11b8bf8fb6d379f280c38.jpg',
        '/startup.html/4c7b9e57869e628ba0c37f849d73a237.jpg',
        '/startup.html/97f7726b1f83934a6fcf5c52c4eb5f55.jpg',
        '/startup.html/car2.jpg',
        '/startup.html/spalsh.jpg'
      ];
      const randomStartupBackground =
        startupBackgroundImages[Math.floor(Math.random() * startupBackgroundImages.length)];
      if (leftPanel) {
        leftPanel.style.backgroundImage = `url('${randomStartupBackground}')`;
      }

      document.body.classList.toggle('night', isNight);
      logo.src = isNight ? '/trapcode.png' : '/NewIcons.svg';
      logo.alt = isNight ? 'Trapcode' : 'TrapGaint';

      // Cycle through loading states
      const loadingStates = [
        'Fetching profile',
        'Loading user data',
        'Fetching data',
        'Checking updates',
        'Initializing launcher',
        'Setting up',
        'Loading resources',
        'Preparing interface',
        'Almost done',
        'Finalizing'
      ];
      let currentIndex = 0;
      const statusText = document.getElementById('statusText');

      setInterval(() => {
        currentIndex = (currentIndex + 1) % loadingStates.length;
        if (statusText) {
          statusText.textContent = loadingStates[currentIndex];
        }
      }, 3000);
    })();
  </script>
</body>
</html>
